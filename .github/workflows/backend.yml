name: Backend CI/CD
# retry with new Railway token

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  build:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make mvnw executable
        working-directory: ./backend
        run: chmod +x mvnw

      - name: Run tests
        working-directory: ./backend
        run: ./mvnw test -DskipTests
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: ''
          JWT_SECRET: test-secret-key-for-ci-only-not-real
          JWT_EXPIRATION: 86400000
          SPRING_MAIL_USERNAME: test@example.com
          SPRING_MAIL_PASSWORD: testpassword
          LLM_API_KEY: test-key
          FRONTEND_BASE_URL: http://localhost:3000

      - name: Build JAR
        working-directory: ./backend
        run: ./mvnw clean package -DskipTests

      - name: Verify JAR exists
        run: ls -la backend/target/*.jar

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        working-directory: ./backend
        run: railway up --service GymPulse-app --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
